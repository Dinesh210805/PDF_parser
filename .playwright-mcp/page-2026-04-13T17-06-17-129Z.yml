              - heading "📝 Extracted Text" [level=4] [ref=e119]
              - paragraph [ref=e120]: U20ITCM09 DEEP LEARNING UNIT III UNIT III RECURRENT NEURAL NETWORK (RNN) (9 Hrs) Recurrent Neural Network – Long Short-Term Memory Network – Implementation of RNN & LSTM – Hyperparameters – Embeddings & Word2vec – Sentiment Prediction RNN RECURRENT NEURAL NETWORK Recurrent Neural Network(RNN) is a type of Neural Network where the output from the previous step is fed as input to the current step. In traditional neural networks, all the inputs and outputs are independent of each other. Still, in cases when it is required to predict the next word of a sentence, the previous words are required and hence there is a need to remember the previous words. Thus RNN came into existence, which solved this issue with the help of a Hidden Layer. The main and most important feature of RNN is its Hidden state, which remembers some information about a sequence. The state is also referred to as Memory State since it remembers the previous input to the network. It uses the same parameters for each input as it performs the same task on all the inputs or hidden layers to produce the output. This reduces the complexity of parameters, unlike other neural networks. How RNN differs from Feedforward Neural Network? Artificial neural networks that do not have looping nodes are called feed forward neural networks. Because all information is only passed forward, this kind of neural network is also referred to as a multi-layer neural network. Information moves from the input layer to the output layer – if any hidden layers are present – unidirectionally in a feedforward neural network. These networks are appropriate for image classification tasks, for example, where input and output are independent. Nevertheless, their inability to retain previous inputs automatically renders them less useful for sequential data analysis. IV YR / VIII SEM Page 1
