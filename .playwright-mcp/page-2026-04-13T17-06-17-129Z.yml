              - paragraph [ref=e202]: U20ITCM09 DEEP LEARNING UNIT III Recurrent Neuron and RNN Unfolding The fundamental processing unit in a Recurrent Neural Network (RNN) is a Recurrent Unit, which is not explicitly called a “Recurrent Neuron.” This unit has the unique ability to maintain a hidden state, allowing the network to capture sequential dependencies by remembering previous inputs while processing. Long Short-Term Memory (LSTM) and Gated Recurrent Unit (GRU) versions improve the RNN’s ability to handle long-term dependencies. L – long short term W – weight h – current state U – hidden state V – output state X – input state Page 2 IV YR / VIII SEM
