              - paragraph [ref=e419]: "U20ITCM09 DEEP LEARNING UNIT III weight across the network remains the same. It calculates state hidden state Hi for every input Xi . By using the following formulas: h= σ(UX + Wh-1 + B) Y = O(Vh + C) Hence Y = f (X, h , W, U, V, B, C) Here S is the State matrix which has element si as the state of the network at timestep i The parameters in the network are W, U, V, c, b which are shared across timestep How does RNN work? The Recurrent Neural Network consists of multiple fixed activation function units, one for each time step. Each unit has an internal state which is called the hidden state of the unit. This hidden state signifies the past knowledge that the network currently holds at a given time step. This hidden state is updated at every time step to signify the change in the knowledge of the network about the past. The hidden state is updated using the following recurrence relation:- The formula for calculating the current state: where, ● ht -> current state ● ht-1 -> previous state ● xt -> input state Formula for applying Activation function(tanh) where, ● whh -> weight at recurrent neuron ● wxh -> weight at input neuron The formula for calculating output: ● Yt -> output ● Why -> weight at output layer IV YR / VIII SEM Page 5"
