                - listitem [ref=e517]: "Explicit: treating all other inputs as constant"
                - listitem [ref=e518]: "Implicit: Summing over all indirect paths from h3 to W This algorithm is called backpropagation through time (BPTT) as we backpropagate over all previous time steps Issues of Standard RNNs"
                - listitem [ref=e519]: "Vanishing Gradient: Text generation, machine translation, and stock market prediction are just a few examples of the time-dependent and sequential data problems that can be modelled with recurrent neural networks. You will discover, though, that the gradient problem makes training RNN difficult."
                - listitem [ref=e520]: "Exploding Gradient: An Exploding Gradient occurs when a neural network is being trained and the slope tends to grow exponentially rather than decay. Large error gradients that build up during training lead to very large updates to the neural network model weights, which is the source of this issue. Training through RNN"
                - listitem [ref=e521]: A single-time step of the input is provided to the network.
                - listitem [ref=e522]: Then calculate its current state using a set of current input and the previous state.
                - listitem [ref=e523]: The current ht becomes ht-1 for the next time step.
                - listitem [ref=e524]: One can go as many time steps according to the problem and join the information from all the previous states.
                - listitem [ref=e525]: Once all the time steps are completed the final current state is used to calculate the output.
                - listitem [ref=e526]: The output is then compared to the actual output i.e the target output and the error is generated.
                - listitem [ref=e527]: The error is then back-propagated to the network to update the weights and hence the network (RNN) is trained using Backpropagation through time. Advantages and Disadvantages of Recurrent Neural Network Advantages
