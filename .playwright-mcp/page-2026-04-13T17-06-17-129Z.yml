              - paragraph [ref=e463]: U20ITCM09 DEEP LEARNING UNIT III These parameters are updated using Backpropagation. However, since RNN works on sequential data here we use an updated backpropagation which is known as Backpropagation through time. Backpropagation Through Time (BPTT) In RNN the neural network is in an ordered fashion and since in the ordered network each variable is computed one at a time in a specified order like first h1 then h2 then h3 so on. Hence we will apply backpropagation throughout all these hidden time states sequentially. ● L(θ)(loss function) depends on h3 ● h3 in turn depends on h2 and W ● h2 in turn depends on h1 and W ● h1 in turn depends on h0 and W ● where h0 is a constant starting state. For simplicity of this equation, we will apply backpropagation on only one row We already know how to compute this one as it is the same as any simple deep neural network backpropagation. IV YR / VIII SEM Page 6
