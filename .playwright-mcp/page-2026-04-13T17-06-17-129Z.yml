                - emphasis [ref=e879]: "[Direct text extraction]"
              - paragraph [ref=e880]: U20ITCM09 DEEP LEARNING UNIT III Gates Gates make use of sigmoid activation or you can say tanh activation. values ranges in tanh activation are 0 -1.
              - list [ref=e881]:
                - listitem [ref=e882]: Forget Gate
                - listitem [ref=e883]: Input Gate
                - listitem [ref=e884]: "Output Gate Let’s see these gates in detail: Forget Gate This gate decides what information should be carried out forward or what information should be ignored. Information from previous hidden states and the current state information passes through the sigmoid function. Values that come out from sigmoid are always between 0 and 1. if the value is closer to 1 means information should proceed forward and if value closer to 0 means information should be ignored. Input Gate After deciding the relevant information, the information goes to the input gate, Input gate passes the relevant information, and this leads to updating the cell states. simply saving updating the weight. Input gate adds the new relevant information to the existing information by updating cell states. Output Gate After the information is passed through the input gate, now the output gate comes into play. Output gate generates the next hidden states. and cell states are carried over the next time step. EMBEDDINGS AND WORD2VEC: What is Word Embedding? Word Embedding is a language modeling technique for mapping words to vectors of real numbers. It represents words or phrases in vector space with several dimensions. Word embeddings can be generated using various methods like neural networks, co-occurrence matrices, probabilistic models, etc. Word2Vec consists of models for generating word embedding. These models are shallow two-layer neural networks having one input layer, one hidden layer, and one output layer. What is Word2Vec? Word2Vec is a widely used method in natural language processing (NLP) that allows words to be represented as vectors in a continuous vector space. Word2Vec is an effort to map words to high-dimensional vectors to capture the semantic relationships between words, developed by Page 17 IV YR / VIII SEM"
              - separator [ref=e885]
          - generic [ref=e886]:
            - heading "Markdown • Page 18" [level=3] [ref=e887]
            - generic [ref=e888]:
              - paragraph [ref=e889]:
