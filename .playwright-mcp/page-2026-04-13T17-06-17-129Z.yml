            - generic [ref=e692]:
              - paragraph [ref=e693]:
                - emphasis [ref=e694]: "[Direct text extraction]"
              - paragraph [ref=e695]: "U20ITCM09 DEEP LEARNING UNIT III ● Compared to simpler architectures like feed-forward neural networks LSTM networks are computationally more expensive. This can limit their scalability for large-scale datasets or constrained environments. ● Training LSTM networks can be more time-consuming compared to simpler models due to their computational complexity. So training LSTMs often requires more data and longer training times to achieve high performance. Applications of LSTM Some of the famous applications of LSTM includes: ● Language Modeling: LSTMs have been used for natural language processing tasks such as language modeling, machine translation, and text summarization. They can be trained to generate coherent and grammatically correct sentences by learning the dependencies between words in a sentence. ● Speech Recognition: LSTMs have been used for speech recognition tasks such as transcribing speech to text and recognizing spoken commands. They can be trained to recognize patterns in speech and match them to the corresponding text. ● Time Series Forecasting: LSTMs have been used for time series forecasting tasks such as predicting stock prices, weather, and energy consumption. They can learn patterns in time series data and use them to make predictions about future events. Hyperparameters in Deep Learning Introduction Deep learning, a subset of machine learning, has revolutionized various fields, from natural language processing to image recognition. At the heart of deep learning’s success is the nuanced and often complex process of training deep neural networks. This training is heavily influenced by hyperparameters, adjustable settings that dictate the model’s learning process. Unlike parameters, which the model learns through training, hyperparameters are preset by the practitioner and remain constant during the training phase. Understanding and optimizing these hyperparameters is crucial for building effective deep learning models. IV YR / VIII SEM Page 12"
              - separator [ref=e696]
          - generic [ref=e697]:
            - heading "Markdown • Page 13" [level=3] [ref=e698]
            - generic [ref=e699]:
              - paragraph [ref=e700]:
                - emphasis [ref=e701]: "[Text + VLM for visuals]"
              - heading "📝 Extracted Text" [level=4] [ref=e702]
              - paragraph [ref=e703]: "U20ITCM09 DEEP LEARNING UNIT III The Importance of Hyperparameters Hyperparameters play a pivotal role in the performance of deep learning models. They impact how quickly a model learns, its ability to generalize from training data to unseen data, and its overall performance. The right set of hyperparameters can mean the difference between a mediocre model and a highly accurate one. However, determining the optimal hyperparameters is not straightforward. It requires a deep understanding of both the theoretical aspects of deep learning and practical experience. Key Hyperparameters in Deep Learning Hyperparameters in deep learning are adjustable parameters that you choose to train a model that govern the training process itself. Unlike model parameters, which are learned during training, hyperparameters are set prior to the training process and remain constant during training. They can significantly influence the performance of your trained models. Here are some of the most common hyperparameters in deep learning:"
              - list [ref=e704]:
                - listitem [ref=e705]: "Learning Rate: Perhaps the most critical hyperparameter, the learning rate determines the step size at each iteration while moving toward a minimum of the loss function."
                - listitem [ref=e706]: "Number of Epochs: This is the number of times the learning algorithm will work through the entire training dataset."
                - listitem [ref=e707]: "Batch Size: It refers to the number of training samples used in one iteration. IV YR / VIII SEM Page 13"
