            - generic [ref=e771]:
              - paragraph [ref=e772]:
                - emphasis [ref=e773]: "[Direct text extraction]"
              - paragraph [ref=e774]: "U20ITCM09 DEEP LEARNING UNIT III 4. Number of Layers and Neurons in Each Layer: In neural networks, deciding on the number of layers and the number of neurons in each layer can significantly impact the model’s performance. 5. Activation Function: Functions like ReLU, Sigmoid, and Tanh, determine the output of a neural network node given an input or set of inputs. 6. Optimizer: Algorithms like SGD, Adam, and RMSprop are used to change the attributes of the neural network such as weights and learning rate to reduce the losses. 7. Dropout Rate: Used in dropout layers to prevent overfitting, it determines the fraction of the output units to drop at each training stage. 8. Weight Initialization: This defines the method to set the initial random weights of Keras layers. 9. Momentum: Often used in optimization algorithms, it helps to accelerate gradient vectors in the right directions, thus leading to faster converging. 10. Regularization Techniques: Techniques like L1 and L2 regularization to prevent overfitting by penalizing complex models. The choice of hyperparameters can vary widely depending on the specific problem and data set. Selecting the right set of hyperparameters is more of an art than a science, often involving a fair bit of trial and error or more systematic approaches like grid search or random search. Challenges in Hyperparameter Tuning Choosing the right hyperparameters is often challenging. It’s a multidimensional problem where each hyperparameter can interact with others in unpredictable ways. Manual tuning is time-consuming and requires extensive experience. Therefore, automated methods like grid search, random search, and Bayesian optimization are increasingly popular. These methods systematically explore the hyperparameter space to find the most effective combination. Implementation of RNN and LSTM: Introduction In NLP we have seen some NLP tasks using traditional neural networks, like text classification, sentiment analysis, and we did it with satisfactory results. but this wasn’t enough, we faced certain problems with traditional neural networks as given below. ● The prediction was highly dependent on the specific words. ● If you change any word with it synonyms result gets deviated.3. If you write like, affection instead of love, the result gets deviated.4. The prediction was not dependent on the sequence of words. IV YR / VIII SEM Page 14"
              - separator [ref=e775]
          - generic [ref=e776]:
            - heading "Markdown • Page 15" [level=3] [ref=e777]
            - generic [ref=e778]:
              - paragraph [ref=e779]:
                - emphasis [ref=e780]: "[Text + VLM for visuals]"
              - heading "📝 Extracted Text" [level=4] [ref=e781]
              - paragraph [ref=e782]: "U20ITCM09 DEEP LEARNING UNIT III To fix this problem we came up with the idea of Word Embedding and a model which can store the sequence of the words and depending on the sequence it can generate results. ie “I love playing Ball” and “I do not love playing Ball” In both the sentence we see “love” hence our vanilla model can classify it as a positive sentiment but as you see its negative sentiment, here sequence of words matters a lot. So far we had no model which can consider the sequence of words in a sentence for the prediction. RNN Model ( Recurrent Neural Networks) To solve this problem Recurrent neural network came into the picture. which solves this problem by using hidden layers. and hidden layers are the main features of a recurrent neural network. hidden layers help RNN to remember the sequence of words (data) and use the sequence pattern for the prediction. The idea of RNN has developed a lot. it has been used for speech recognition and various NLP tasks where the sequence of words matters. RNN takes input as time series (sequence of words ), we can say RNN acts like a memory that remembers the sequence. Use cases of RNN Speech, text recognition & sentiment classificationMusic synthesisImage captioningChatbots & NLP(natural language processing)Machine Translation — Language translationStock predictionsFinding and blocking abusive words in a speech or text Does RNN sound so powerful? No ! there is a big problem. Problems with RNN : Exploding and vanishing gradient problems during backpropagation. Gradients are those values which to update neural networks weights. In other words, we can say that Gradient carries information. Vanishing gradient is a big problem in deep neural networks. it vanishes or explodes quickly in earlier layers and this makes RNN unable to hold information of longer sequence. and thus RNN becomes short-term memory. Page 15 IV YR / VIII SEM"
