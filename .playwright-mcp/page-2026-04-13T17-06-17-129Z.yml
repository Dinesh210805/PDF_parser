              - heading "📝 Extracted Text" [level=4] [ref=e554]
              - paragraph [ref=e555]: "U20ITCM09 DEEP LEARNING UNIT III ● Bi LSTM have been shown to achieve state-of-the-art results on a wide variety of tasks, including machine translation, speech recognition, and text summarization. LSTMs can be stacked to create deep LSTM networks, which can learn even more complex patterns in sequential data. Each LSTM layer captures different levels of abstraction and temporal dependencies in the input data. Architecture and Working of LSTM LSTM architecture has a chain structure that contains four neural networks and different memory blocks called cells. nformation is retained by the cells and the memory manipulations are done by the gates. There are three gates – Forget Gate The information that is no longer useful in the cell state is removed with the forget gate. Two inputs xt (input at the particular time) and ht-1 (previous cell output) are fed to the gate and multiplied with weight matrices followed by the addition of bias. The resultant is passed through an activation function which gives a binary output. If for a particular cell state the output is 0, the piece of information is forgotten and for output 1, the information is retained for future use. The equation for the forget gate is: f_t = σ(W_f · [h_{t-1}, x_t] + b_f) where: ● W_f represents the weight matrix associated with the forget gate. ● [h_t-1, x_t] denotes the concatenation of the current input and the previous hidden state. ● b_f is the bias with the forget gate. ● σ is the sigmoid activation function. IV YR / VIII SEM Page 9"
