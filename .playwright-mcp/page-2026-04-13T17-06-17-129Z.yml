              - paragraph [ref=e597]: "U20ITCM09 DEEP LEARNING UNIT III Input gate The addition of useful information to the cell state is done by the input gate. First, the information is regulated using the sigmoid function and filter the values to be remembered similar to the forget gate using inputs ht-1 and xt. . Then, a vector is created using tanh function that gives an output from -1 to +1, which contains all the possible values from ht-1 and xt. At last, the values of the vector and the regulated values are multiplied to obtain the useful information. The equation for the input gate is: i_t = σ(W_i · [h_{t-1}, x_t] + b_i) Ĉ_t = tanh(W_c · [h_{t-1}, x_t] + b_c) C_t = f_t ⊙ C_{t-1} + i_t ⊙ Ĉ_t where ● ⊙ denotes element-wise multiplication ● tanh is tanh activation function Page 10 IV YR / VIII SEM"
