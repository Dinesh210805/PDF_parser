              - paragraph [ref=e515]: "U20ITCM09 DEEP LEARNING UNIT III .However, we will see how to apply backpropagation to this term As we know h3 = σ(Wh2 + b) And In such an ordered network, we can’t compute by simply treating h3 as a constant because as it also depends on W. the total derivative has two parts:"
