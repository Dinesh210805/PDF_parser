              - heading "📝 Extracted Text" [level=4] [ref=e830]
              - paragraph [ref=e831]: U20ITCM09 DEEP LEARNING UNIT III If we apply RNN for a paragraph RNN may leave out necessary information due to gradient problems and not be able to carry information from the initial time step to later time steps. To solve this problem LSTM, GRU came into the picture. How do LSTM, GRU solve this problem? I highly encourage you to read Colah’s blog for in-depth knowledge of LSTM. The reason for exploding gradient was the capturing of relevant and irrelevant information. a model which can decide what information from a paragraph and relevant and remember only relevant information and throw all the irrelevant information This is achieved by using gates. the LSTM ( Long -short-term memory ) and GRU ( Gated Recurrent Unit ) have gates as an internal mechanism, which control what information to keep and what information to throw out. By doing this LSTM, GRU networks solve the exploding and vanishing gradient problem. Almost each and every SOTA ( state of the art) model based on RNN follows LSTM or GRU networks for prediction. LSTMs /GRUs are implemented in speech recognition, text generation, caption generation, etc. LSTM networks Step by Step Every LSTM network basically contains three gates to control the flow of information and cells to hold information. The Cell States carries the information from initial to later time steps without getting vanished. IV YR / VIII SEM Page 16
